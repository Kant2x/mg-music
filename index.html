<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .flip-container {
      perspective: 1000px;
      width: 100%;
      height: 100%;
    }
    .flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .flipped {
      transform: rotateY(180deg);
    }
    .flip-front, .flip-back {
      object-fit: cover;
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      object-fit: cover;
    }
    .flip-back {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" style="background-color: #D7a1f9;">
  <div class="container mx-auto px-4 max-w-full sm:max-w-lg md:max-w-6xl">
    <h1 class="text-4xl font-bold text-black text-center mb-8">Message Gallery</h1>
    <p class="text-center mb-8">with music</p>

    <div class="flex flex-col md:flex-row gap-8 mb-12">
      <!-- Text -->
      <div class="w-full md:w-1/2 rounded-xl shadow-lg p-6 h-64 md:h-96 flex items-center justify-center bg-cover bg-center"
style="background-image: url('liliesda.jpg');">
        <h2 id="textContent" class="text-2xl font-semibold text-black text-center"></h2>
      </div>

      <!-- Image -->
    <div class="w-full md:w-1/2 cursor-pointer rounded-xl overflow-hidden shadow-lg h-64 sm:h-72 md:h-96">
        <div id="flipContainer" class="flip-container h-full">
          <div id="flipInner" class="flip-inner">
            <img id="imageFront" src="" alt="Front" class="flip-front rounded-xl">
            <img id="imageBack" src="" alt="Back" class="flip-back rounded-xl">
          </div>
        </div>
      </div>
    </div>

    <!-- Music Player + Playlist -->
    <div class="bg-white rounded-xl shadow-lg p-6 w-full md:w-full mx-auto">
      <div class="flex flex-col md:flex-row items-center gap-4">
        <div class="w-16 h-16 md:w-20 md:h-20 bg-green-100 rounded-lg flex items-center justify-center">
          <i class="fas fa-music text-green-600 text-2xl"></i>
        </div>
        <div class="flex-1 w-full">
          <h3 class="font-semibold text-black" id="songTitle"></h3>
          <p class="text-sm text-gray-500" id="songArtist"></p>
          <div class="mt-2 flex items-center gap-2">
            <button id="prevBtn" class="text-green-600 hover:text-green-800"><i class="fas fa-step-backward"></i></button>
            <button id="playBtn" class="bg-green-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-green-700"><i class="fas fa-play"></i></button>
            <button id="nextBtn" class="text-green-600 hover:text-green-800"><i class="fas fa-step-forward"></i></button>
            <div class="ml-4 flex-1">
              <div class="h-1 bg-gray-200 rounded-full">
                <div class="h-1 bg-green-600 rounded-full" id="progressBar" style="width: 0%"></div>
              </div>
            </div>
            <span class="text-xs text-gray-500 ml-2" id="timeDisplay"></span>
          </div>
        </div>
      </div>
      <audio id="audioPlayer" class="mt-4 w-full"></audio>
      <div class="music-player bg-white rounded-xl shadow-lg p-6 w-full">


      <!-- Playlist -->
      <div id="playlist" class="mt-6">
        <h4 class="text-green-800 font-semibold mb-2">Playlist</h4>
        <ul class="space-y-2 max-h-40 overflow-y-auto pr-2" id="playlistItems">
      </div>
    </div>
    <p class="text-2xl text-center mb-8">Choose music here</p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const textContent = document.getElementById('textContent');
      const playBtn = document.getElementById('playBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const audioPlayer = document.getElementById('audioPlayer');
      const songTitle = document.getElementById('songTitle');
      const songArtist = document.getElementById('songArtist');
      const timeDisplay = document.getElementById('timeDisplay');
      const progressBar = document.getElementById('progressBar');
      const playlistItems = document.getElementById('playlistItems');

      const imageFront = document.getElementById('imageFront');
      const imageBack = document.getElementById('imageBack');
      const flipInner = document.getElementById('flipInner');

      const gallery = [
        {
          text: "I thought my favorite thing to listen to was music til i heard you laugh",
          img: "1st.jpg",
          title: "Prettiest Thing Ive Ever Seen",
          artist: "LANY",
          url: "pties.mp3"
        },
        {
          text: "I thought i could explain everything i feel until you became one thing i couldn't put into words ",
          img: "2nd.jpg",
          title: "How To Hold An Angel",
          artist: "LANY",
          url: "LANY - How To Hold An Angel (Lyrics) - kronkerul (youtube).mp3"
        },
        {
          text: "I thought my favorite place was somewhere far away, turns out it's wherever you are.",
          img: "3rd.jpg",
          title: "Sound of Rain",
          artist: "LANY",
          url: "LANY - Sound of Rain (Lyrics) - Ethereal Music (youtube).mp3"
        },
        {
          text: "I thought i knew what it's meant to be seen, until you noticed the parts of me i tried to hide",
          img: "4th.jpg",
          title: "Know You Naked",
          artist: "LANY",
          url: "LANY - Know You Naked (Lyrics) - Ethereal Music (youtube).mp3"
        }
      ];

      let index = 0;
      let isPlaying = false;
      let isFront = true;

      function updateContent() {
        const item = gallery[index];
        textContent.textContent = item.text;
        songTitle.textContent = item.title;
        songArtist.textContent = item.artist;
        audioPlayer.src = item.url;

        if (isFront) {
          imageBack.src = item.img;
        } else {
          imageFront.src = item.img;
        }

        flipInner.classList.toggle('flipped');
        isFront = !isFront;
      }

      // Playlist click
      gallery.forEach((item, i) => {
        const li = document.createElement('li');
        li.textContent = `${item.title} - ${item.artist}`;
        li.className = "cursor-pointer text-green-700 hover:text-green-900";
        li.addEventListener('click', () => {
          index = i;
          updateContent();
          audioPlayer.play();
          isPlaying = true;
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        playlistItems.appendChild(li);
      });

      // Flip click
      flipInner.addEventListener('click', () => {
        index = (index + 1) % gallery.length;

        const item = gallery[index];
        textContent.textContent = item.text;

        // Only change the image, not audio
        if (isFront) {
            imageBack.src = item.img;
        } else {
            imageFront.src = item.img;
        }

        // Flip animation
        flipInner.classList.toggle('flipped');
        isFront = !isFront;
    });


      // Play/Pause
      playBtn.addEventListener('click', function () {
        if (isPlaying) {
          audioPlayer.pause();
          playBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
          audioPlayer.play();
          playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
        isPlaying = !isPlaying;
      });

      // Next / Prev
      nextBtn.addEventListener('click', () => {
        index = (index + 1) % gallery.length;
        updateContent();
        if (isPlaying) audioPlayer.play();
      });
      prevBtn.addEventListener('click', () => {
        index = (index - 1 + gallery.length) % gallery.length;
        updateContent();
        if (isPlaying) audioPlayer.play();
      });

      // Progress
      audioPlayer.addEventListener('timeupdate', function () {
        const currentTime = formatTime(audioPlayer.currentTime);
        const duration = formatTime(audioPlayer.duration);
        timeDisplay.textContent = `${currentTime} / ${duration}`;
        progressBar.style.width = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
      });

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60) || 0;
        const secs = Math.floor(seconds % 60) || 0;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }

      updateContent(); // Initial load
    });
  </script>
</body>
</html>
